{% extends 'base.html' %}

{% block title %}Change Password | Saminel Flame{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="container">
    <article class="auth-card">
      <h1>Change Password</h1>
      <p class="form-inline-note">Use a strong password to keep your account secure.</p>

      {% if form.errors %}
        <div class="form-errors">Please correct the errors below.</div>
      {% endif %}

      <form method="post" class="auth-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Update password</button>
      </form>
    </article>
  </div>
</section>
{% endblock %}
