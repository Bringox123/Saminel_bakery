{% extends 'base.html' %}

{% block title %}Forgot Password | Saminel Flame{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="container">
    <article class="auth-card">
      <h1>Forgot Password</h1>
      <p class="form-inline-note">Enter your account email and we will send a reset link.</p>
      <form method="post" class="auth-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Send reset link</button>
      </form>
    </article>
  </div>
</section>
{% endblock %}
