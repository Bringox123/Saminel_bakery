{% extends 'base.html' %}

{% block title %}Reset Password | Saminel Flame{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="container">
    <article class="auth-card">
      <h1>Set a new password</h1>
      {% if validlink %}
        <form method="post" class="auth-grid">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Save new password</button>
        </form>
      {% else %}
        <p>This password reset link is invalid or expired.</p>
        <p><a class="btn btn-primary" href="{% url 'bakery:password_reset' %}">Request a new reset link</a></p>
      {% endif %}
    </article>
  </div>
</section>
{% endblock %}
